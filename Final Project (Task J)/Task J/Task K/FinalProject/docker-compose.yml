name: Advanced-Web-Development-Final-Project
services:
  frontend:
    build:
      context: ./frontend
    container_name: fullstack-frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    build:
      context: ./backend
    container_name: fullstack-api
    environment:
      PORT: ${PORT}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - db

  db:
    image: postgres:latest
    container_name: fullstack-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgroot:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT}:5432"

volumes:
  pgroot: {}